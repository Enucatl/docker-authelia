---
###############################################################
#                   Authelia configuration                    #
###############################################################

certificates_directory: /certs/

server:
  address: 'tcp://:::9091/'
  # needed for read_only: true
  # still runs the healtcheck, just doesn't write the config file on startup in
  # the ephemeral storage
  disable_healthcheck: true
  endpoints:
    authz:
      forward-auth:
        implementation: 'ForwardAuth'

log:
  level: debug
  keep_stdout: true

totp:
  issuer: authelia.docker.home.arpa

authentication_backend:
  ldap:
    implementation: custom
    timeout: 10s
    start_tls: false
    tls:
      server_name: freeipa.home.arpa
    base_dn: dc=home,dc=arpa
    additional_users_dn: cn=users,cn=accounts
    users_filter: (&({username_attribute}={input})(objectClass=posixAccount))
    additional_groups_dn: cn=groups,cn=accounts
    groups_filter: (&(member={dn})(objectClass=groupOfNames))
    permit_unauthenticated_bind: false
    user: uid=ldap_ro,cn=users,cn=accounts,dc=home,dc=arpa
    attributes:
      username: uid
      display_name: uid
      mail: mail
      group_name: cn
      extra:
        mail:
          name: 'ldap_email'
          multi_valued: false
          value_type: 'string'

access_control:
  default_policy: deny
  networks:
    - name: local
      networks:
        - '{{ env "LAN_SUBNET" }}'
        - '{{ env "TRUSTED_WIFI_SUBNET" }}'
        - '{{ env "WG_SUBNET" }}'
        - '172.16.0.0/12'
        - '{{ env "IPV6_LAN_SUBNET" }}'
        - '{{ env "IPV6_TRUSTED_WIFI_SUBNET" }}'
        - '{{ env "IPV6_WG_SUBNET" }}'
  rules:
    - domain: "*.docker.home.arpa"
      networks:
        - 'local'
      policy: one_factor

session:
  cookies:
    - name: authelia_session
      domain: docker.home.arpa
      authelia_url: 'https://authelia.docker.home.arpa'
      default_redirection_url: 'https://traefik.docker.home.arpa/dashboard/#/'
      same_site: 'lax'
      inactivity: '1d'
      expiration: '2d'
      remember_me: '30d'
  redis:
    host: authelia-redis-1
    port: 6379

identity_providers:
  oidc:
    hmac_secret: {{ secret "/run/secrets/oidc_hmac_secret" | msquote }}
    jwks:
      - algorithm: 'RS256'
        use: 'sig'
        key: {{ secret "/run/secrets/oidc_jwks_rs256_key" | mindent 10 "|" | msquote }}
      - algorithm: 'ES256'
        use: 'sig'
        key: {{ secret "/run/secrets/oidc_jwks_es256_key" | mindent 10 "|" | msquote }}
    enforce_pkce: public_clients_only
    enable_pkce_plain_challenge: false
    claims_policies:
      grafana:
        id_token: ['email', 'name', 'groups', 'preferred_username']
        custom_claims:
          email:
            attribute: 'ldap_email'
    clients:
      - client_id: 'grafana'
        client_name: 'Grafana'
        client_secret: {{ secret "/run/secrets/oidc_grafana_client_secret_digest" | msquote }}
        public: false
        consent_mode: 'pre-configured'
        pre_configured_consent_duration: 365d
        authorization_policy: 'one_factor'
        require_pkce: true
        pkce_challenge_method: 'S256'
        redirect_uris:
          - 'https://grafana.docker.home.arpa/login/generic_oauth'
        scopes:
          - 'openid'
          - 'profile'
          - 'groups'
          - 'email'
        response_types:
          - 'code'
        grant_types:
          - 'authorization_code'
        claims_policy: 'grafana'
        access_token_signed_response_alg: 'none'
        userinfo_signed_response_alg: 'none'
        token_endpoint_auth_method: 'client_secret_basic'

regulation:
  max_retries: 3
  find_time: 120
  ban_time: 300

storage:
  postgres:
    address: tcp://authelia-postgres-1:5432
    database: authelia
    username: postgres
    password: '{{ env "POSTGRES_PASSWORD" }}'

notifier:
  smtp:
    address: submission://smtp.gmail.com:587
    username: '{{ env "SMTP_USERNAME" }}'
    password: '{{ env "SMTP_PASSWORD" }}'
    sender: '{{ env "SMTP_SENDER" }}'
    identifier: "authelia.docker.home.arpa"
    startup_check_address: '{{ env "SMTP_SENDER" }}'
